<!DOCTYPE html>
<html lang="en">
<head>
    <title>three.js xr - Hit Test + Dragging with Depth</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link type="text/css" rel="stylesheet" href="main.css">
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        #info {
            position: absolute; top: 10px; width: 100%;
            text-align: center; color: white; font-family: monospace;
            z-index: 100; pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div id="info">Hit Test: toca para colocar leñador | Drag: toca cubo para arrastrar</div>

    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js",
                "three/addons/": "./jsm/"
            }
        }
    </script>

    <script type="module">

        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        // ========== VARIABLES GLOBALES ==========
        let camera, scene, renderer;
        let controller;
        let reticle;
        let lenador, lenadorMixer;
        let cube, cubeWrapper;
        let hitTestSource = null;
        let draggedObject = null;
        let isDepthSupplied = false;

        const raycaster = new THREE.Raycaster();
        const tempMatrix = new THREE.Matrix4();
        const clock = new THREE.Clock();

        init();
        animate();

        // ========== INIT ==========
        function init() {

            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Luces
            scene.add(new THREE.HemisphereLight(0xa5a5a5, 0x898989, 3));
            const light = new THREE.DirectionalLight(0xffffff, 3);
            light.position.set(1, 1, 1).normalize();
            scene.add(light);

            // ========== RETÍCULA PARA HIT TEST ==========
            const reticleGeometry = new THREE.RingGeometry(0.05, 0.07, 32);
            const reticleMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00, side: THREE.DoubleSide, transparent: true, opacity: 0.8
            });
            reticle = new THREE.Mesh(reticleGeometry, reticleMaterial);
            reticle.visible = false;
            reticle.matrixAutoUpdate = false;
            scene.add(reticle);

            // ========== CUBO CON SHADER DE PROFUNDIDAD ==========
            const cubeGeometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);

            const cubeMaterial = new THREE.ShaderMaterial({
                vertexShader: /* glsl */`
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,

                fragmentShader: /* glsl */`
                    uniform vec3 diffuseColor;
                    uniform float roughness;
                    uniform float metalness;
                    uniform float emissive;
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    uniform sampler2DArray depthColor;
                    uniform float depthWidth;
                    uniform float depthHeight;
                    #define saturate(a) clamp(a, 0.0, 1.0)
                    float Depth_GetCameraDepthInMeters(const sampler2DArray depthTexture,
                        const vec2 depthUv, int arrayIndex) {
                        return texture(depthColor, vec3(depthUv.x, depthUv.y, arrayIndex)).r;
                    }
                    float Depth_GetOcclusion(const sampler2DArray depthTexture, const vec2 depthUv, float assetDepthM, int arrayIndex) {
                        float depthMm = Depth_GetCameraDepthInMeters(depthTexture, depthUv, arrayIndex);
                        const float kDepthTolerancePerM = 0.001;
                        return clamp(1.0 -
                            0.5 * (depthMm - assetDepthM) /
                                (kDepthTolerancePerM * assetDepthM) +
                            0.5, 0.0, 1.0);
                    }
                    float Depth_GetBlurredOcclusionAroundUV(const sampler2DArray depthTexture, const vec2 uv, float assetDepthM, int arrayIndex) {
                        const float kKernelTotalWeights = 269.0;
                        float sum = 0.0;
                        const float kOcclusionBlurAmount = 0.0005;
                        vec2 blurriness = vec2(kOcclusionBlurAmount, kOcclusionBlurAmount);
                        float current = 0.0;
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-1.0, -2.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+1.0, -2.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-1.0, +2.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+1.0, +2.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-2.0, +1.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+2.0, +1.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-2.0, -1.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+2.0, -1.0) * blurriness, assetDepthM, arrayIndex);
                        sum += current * 4.0;
                        current = 0.0;
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-2.0, -0.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+2.0, +0.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+0.0, +2.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-0.0, -2.0) * blurriness, assetDepthM, arrayIndex);
                        sum += current * 7.0;
                        current = 0.0;
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-1.0, -1.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+1.0, -1.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-1.0, +1.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+1.0, +1.0) * blurriness, assetDepthM, arrayIndex);
                        sum += current * 16.0;
                        current = 0.0;
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+0.0, +1.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-0.0, -1.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(-1.0, -0.0) * blurriness, assetDepthM, arrayIndex);
                        current += Depth_GetOcclusion(depthTexture, uv + vec2(+1.0, +0.0) * blurriness, assetDepthM, arrayIndex);
                        sum += current * 26.0;
                        sum += Depth_GetOcclusion(depthTexture, uv, assetDepthM, arrayIndex) * 41.0;
                        return sum / kKernelTotalWeights;
                    }
                    void main() {
                        vec3 normal = normalize(vNormal);
                        vec3 diffuse = diffuseColor;
                        float specularIntensity = pow(max(dot(normal, normalize(vec3(0, 0, 1))), 0.0), 64.0);
                        vec3 specular = vec3(specularIntensity) * mix(vec3(0.04), diffuse, metalness);
                        gl_FragColor = vec4(diffuse * (1.0 - specular) + specular, 1.0) * (1.0 + emissive);

                        if (depthWidth > 0.0) {
                            int arrayIndex = 0;
                            vec2 depthUv;
                            if (gl_FragCoord.x>=depthWidth) {
                                arrayIndex = 1;
                                depthUv = vec2((gl_FragCoord.x-depthWidth)/depthWidth, gl_FragCoord.y/depthHeight);
                            } else {
                                depthUv = vec2(gl_FragCoord.x/depthWidth, gl_FragCoord.y/depthHeight);
                            }
                            float assetDepthM = gl_FragCoord.z;

                            float occlusion = Depth_GetBlurredOcclusionAroundUV(depthColor, depthUv, assetDepthM, arrayIndex);
                            float depthMm = Depth_GetCameraDepthInMeters(depthColor, depthUv, arrayIndex);

                            float absDistance = abs(assetDepthM - depthMm);
                            float v = 0.0025;
                            absDistance = saturate(v - absDistance) / v;

                            gl_FragColor.rgb += vec3(absDistance * 2.0, absDistance * 2.0, absDistance * 12.0);
                            gl_FragColor = mix(gl_FragColor, vec4(0.0, 0.0, 0.0, 0.0), occlusion * 0.7);
                        }
                    }
                `,

                uniforms: {
                    diffuseColor: { value: new THREE.Color(0xff0000) },
                    roughness: { value: 0.7 },
                    metalness: { value: 0.0 },
                    emissive: { value: 0.0 },
                    depthWidth: { value: 0.0 },
                    depthHeight: { value: 0.0 },
                    depthColor: { value: new THREE.Texture() }
                }
            });

            cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
            cube.castShadow = true;
            cube.receiveShadow = true;

            // Wrapper transparente para drag
            const wrapperGeometry = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const wrapperMaterial = new THREE.MeshBasicMaterial({ visible: false });
            cubeWrapper = new THREE.Mesh(wrapperGeometry, wrapperMaterial);
            cubeWrapper.position.set(0.3, 1.0, -0.5);
            cubeWrapper.add(cube);

            scene.add(cubeWrapper);

            // ========== CARGAR LEÑADOR ==========
            const loader = new FBXLoader();
            loader.load('./models/fbx/Lenador.fbx', function (object) {

                lenador = object;
                lenador.scale.set(0.004, 0.004, 0.004);
                lenador.visible = false;

                // Animación
                lenadorMixer = new THREE.AnimationMixer(lenador);
                if (lenador.animations && lenador.animations.length > 4) {
                    const action = lenadorMixer.clipAction(lenador.animations[4]);
                    action.play();
                } else if (lenador.animations && lenador.animations.length > 0) {
                    const action = lenadorMixer.clipAction(lenador.animations[0]);
                    action.play();
                }

                // Sombras
                lenador.traverse(function (child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(lenador);
            });

            // ========== RENDERER ==========
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // ========== BOTÓN AR ==========
            document.body.appendChild(ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['depth-sensing'],
                depthSensing: { usagePreference: ['gpu-optimized'], dataFormatPreference: [] }
            }));

            // ========== CONTROLADOR ==========
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ========== EVENTO SELECT (TOQUE) ==========
        function onSelect() {

            // Si hay retícula visible, colocar leñador (HIT TEST)
            if (reticle.visible && lenador && !draggedObject) {
                const position = new THREE.Vector3();
                const quaternion = new THREE.Quaternion();
                const scale = new THREE.Vector3();
                reticle.matrix.decompose(position, quaternion, scale);

                lenador.position.copy(position);
                lenador.quaternion.copy(quaternion);
                lenador.visible = true;
                return;
            }

            // Si el cubo está siendo arrastrado, soltar
            if (draggedObject) {
                scene.attach(cubeWrapper);
                draggedObject = null;
                document.getElementById('info').textContent = 'Hit Test: toca para colocar leñador | Drag: toca cubo para arrastrar';
                return;
            }

            // Intentar agarrar cubo (DRAG)
            if (isTouchingCube()) {
                controller.attach(cubeWrapper);
                draggedObject = cubeWrapper;
                document.getElementById('info').textContent = 'Suelta para dejar el cubo';
            }
        }

        // ========== VERIFICAR SI TOCA EL CUBO ==========
        function isTouchingCube() {
            controller.updateMatrixWorld();
            tempMatrix.identity().extractRotation(controller.matrixWorld);

            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

            const intersections = raycaster.intersectObject(cubeWrapper);
            return intersections.length > 0;
        }

        // ========== LOOP ==========
        function animate() {
            renderer.setAnimationLoop(function (time, frame) {

                const delta = clock.getDelta();

                // Actualizar animación del leñador
                if (lenadorMixer) lenadorMixer.update(delta);

                // ========== HIT TEST ==========
                if (frame) {
                    const referenceSpace = renderer.xr.getReferenceSpace();
                    const session = renderer.xr.getSession();

                    if (hitTestSource === null && session !== null) {
                        session.requestReferenceSpace('viewer').then(function (viewerSpace) {
                            session.requestHitTestSource({ space: viewerSpace }).then(function (source) {
                                hitTestSource = source;
                            });
                        });
                    }

                    if (hitTestSource) {
                        const hitTestResults = frame.getHitTestResults(hitTestSource);

                        if (hitTestResults.length > 0) {
                            const hit = hitTestResults[0];
                            const hitPose = hit.getPose(referenceSpace);

                            if (hitPose) {
                                reticle.visible = true;
                                reticle.matrix.fromArray(hitPose.transform.matrix);
                            }
                        } else {
                            reticle.visible = false;
                        }
                    }
                }

                // ========== DEPTH SENSING PARA CUBO ==========
                if (renderer.xr.hasDepthSensing && renderer.xr.hasDepthSensing() && !isDepthSupplied) {
                    cube.material.uniforms.depthColor.value = renderer.xr.getDepthTexture();
                    cube.material.uniforms.depthWidth.value = 1680;
                    cube.material.uniforms.depthHeight.value = 1760;
                    isDepthSupplied = true;
                } else if (renderer.xr.hasDepthSensing && !renderer.xr.hasDepthSensing() && isDepthSupplied) {
                    cube.material.uniforms.depthWidth.value = 0;
                    cube.material.uniforms.depthHeight.value = 0;
                    isDepthSupplied = false;
                }

                renderer.render(scene, camera);
            });
        }

    </script>
</body>
</html>
